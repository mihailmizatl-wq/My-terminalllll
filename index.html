<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTerminal v2</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --panel-bg: #1a1c29;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --text-color: #ffffff;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 800px;
            background: var(--panel-bg);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            inset: 0;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            opacity: 0;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }

        .screen.left {
            transform: translateX(-100%) scale(0.95);
        }

        .screen.right {
            transform: translateX(100%) scale(0.95);
        }

        /* ЭКРАН 1: Главный блок сверху */
        .top-block {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-align: center;
        }

        .display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .amount-display {
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .currency {
            font-size: 2rem;
            color: var(--text-color);
            margin-left: 5px;
        }

        /* КНОПКА ТЕПЕРЬ ТУТ (ВВЕРХУ) */
        .btn-pay {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn-pay:active {
            transform: scale(0.98);
            background: var(--accent-hover);
        }

        /* Клавиатура сдвинута вниз */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex: 1;
            padding-bottom: 10px;
        }

        .key {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 1.6rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.92);
        }

        .key.action {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        /* ЭКРАН 2: NFC */
        .nfc-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
        }

        .nfc-wave {
            width: 120px;
            height: 120px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin: auto 0;
        }

        .nfc-wave::before, .nfc-wave::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            animation: pulse 2s infinite ease-out;
        }

        .nfc-wave::after { animation-delay: 1s; }

        .nfc-icon { font-size: 3rem; animation: float 3s infinite ease-in-out; }

        .status-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        /* ЭКРАН 3: УСПЕХ */
        .success-screen {
            background: linear-gradient(135deg, #0d0e15 0%, #052e16 100%);
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .checkmark-circle {
            width: 130px;
            height: 130px;
            background: rgba(16, 185, 129, 0.1);
            border: 3px solid var(--success-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.3);
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen.active .checkmark-circle { transform: scale(1); }

        .checkmark { font-size: 4.5rem; color: var(--success-color); }

        .success-text { text-align: center; }
        .success-text h2 { font-size: 1.8rem; margin-bottom: 10px; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .fallback-btn {
            background: transparent;
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="terminal">
        
        <div id="screen-amount" class="screen active">
            <div class="top-block">
                <div class="header">
                    <h1>Cyber Terminal</h1>
                </div>
                <div class="display-container">
                    <div class="amount-display"><span id="sum-value">0</span><span class="currency">₽</span></div>
                </div>
                <button class="btn-pay" onclick="goToNfc()">К оплате →</button>
            </div>

            <div class="keyboard">
                <button class="key" onclick="appendNum('1')">1</button>
                <button class="key" onclick="appendNum('2')">2</button>
                <button class="key" onclick="appendNum('3')">3</button>
                <button class="key" onclick="appendNum('4')">4</button>
                <button class="key" onclick="appendNum('5')">5</button>
                <button class="key" onclick="appendNum('6')">6</button>
                <button class="key" onclick="appendNum('7')">7</button>
                <button class="key" onclick="appendNum('8')">8</button>
                <button class="key" onclick="appendNum('9')">9</button>
                <button class="key action" onclick="clearSum()">C</button>
                <button class="key" onclick="appendNum('0')">0</button>
                <button class="key" onclick="appendNum('.')">.</button>
            </div>
        </div>

        <div id="screen-nfc" class="screen right">
            <div class="header">
                <h1>Оплата</h1>
            </div>
            <div class="nfc-container">
                <div class="amount-display" id="target-sum">0 ₽</div>
                <div class="nfc-wave">
                    <div class="nfc-icon">📱</div>
                </div>
                <div style="width: 100%;">
                    <div class="status-text" id="nfc-status">Приложите карту или телефон</div>
                    <button class="fallback-btn" onclick="triggerSuccess()">Симулировать касание (без NFC)</button>
                </div>
            </div>
        </div>

        <div id="screen-success" class="screen right success-screen">
            <div class="checkmark-circle">
                <div class="checkmark">✓</div>
            </div>
            <div class="success-text">
                <h2>Успешно оплачено</h2>
                <div class="amount-display" id="final-sum" style="font-size: 2.5rem; color: var(--success-color);">0.00 ₽</div>
            </div>
            <button class="btn-pay" style="background: var(--success-color); box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);" onclick="resetTerminal()">Новый платеж</button>
        </div>

    </div>

    <script>
        let currentSum = "0";
        const screenAmount = document.getElementById('screen-amount');
        const screenNfc = document.getElementById('screen-nfc');
        const screenSuccess = document.getElementById('screen-success');
        
        let ndef = null;
        let abortController = null;

        function updateDisplay() {
            document.getElementById('sum-value').innerText = currentSum;
        }

        function appendNum(num) {
            if (currentSum === "0" && num !== ".") {
                currentSum = num;
            } else {
                if (num === "." && currentSum.includes(".")) return;
                currentSum += num;
            }
            updateDisplay();
        }

        function clearSum() {
            currentSum = "0";
            updateDisplay();
        }

        function goToNfc() {
            if (parseFloat(currentSum) <= 0) {
                alert("Введите сумму больше 0");
                return;
            }
            document.getElementById('target-sum').innerText = currentSum + " ₽";
            
            screenAmount.className = "screen left";
            screenNfc.className = "screen active";

            startNFC();
        }

        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    abortController = new AbortController();
                    ndef = new NDEFReader();
                    await ndef.scan({ signal: abortController.signal });
                    document.getElementById('nfc-status').innerText = "Датчик готов, поднесите карту...";
                    
                    ndef.onreading = event => {
                        if (navigator.vibrate) navigator.vibrate(200);
                        triggerSuccess();
                    };
                } catch (error) {
                    document.getElementById('nfc-status').innerText = "NFC доступен. Поднесите карту.";
                }
            } else {
                document.getElementById('nfc-status').innerText = "Режим симуляции (нажмите кнопку ниже)";
            }
        }

        function triggerSuccess() {
            if (abortController) abortController.abort();

            document.getElementById('final-sum').innerText = parseFloat(currentSum).toFixed(2) + " ₽";
            
            screenNfc.className = "screen left";
            screenSuccess.className = "screen active";
            
            playBeep();
        }

        function resetTerminal() {
            currentSum = "0";
            updateDisplay();
            screenSuccess.className = "screen right";
            screenAmount.className = "screen active";
        }

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

                oscillator.start();
                setTimeout(() => oscillator.stop(), 150);
            } catch(e) {}
        }
    </script>
</body>
</html>
