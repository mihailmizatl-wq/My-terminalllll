<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SberPay Cyber Terminal Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #060709;
            --panel-bg: rgba(18, 22, 28, 0.85);
            --border-glow: rgba(34, 197, 94, 0.15);
            --sber-emerald: #10b981;
            --sber-neon: #00ff87;
            --cyber-blue: #60a5fa;
            --text-main: #ffffff;
            --text-dim: #6b7280;
            --glass-specular: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 30%, #111c17 0%, var(--bg-dark) 70%);
        }

        /* Корпус терминала — дорогой минимализм */
        .terminal {
            width: 100%;
            max-width: 410px;
            height: 100vh;
            max-height: 840px;
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9), 0 0 80px rgba(16, 185, 129, 0.03);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
        }

        /* Общие стили окон и плавный переплыв (Slide + Fade эффекты) */
        .screen {
            position: absolute;
            inset: 0;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            opacity: 0;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }

        .screen.left { transform: translateX(-100%) scale(0.96); opacity: 0; }
        .screen.right { transform: translateX(100%) scale(0.96); opacity: 0; }

        /* Верхний информационный блок */
        .top-block {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .sber-ic {
            width: 22px;
            height: 22px;
            background: linear-gradient(135deg, var(--sber-neon) 0%, #059669 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.4);
        }
        .sber-ic::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 9px;
            border: solid #060709;
            border-width: 0 2px 2px 0;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .header h1 {
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #9ca3af;
        }

        /* Дисплей ввода */
        .display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }

        .amount-display {
            font-size: 3.6rem;
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text-main);
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .currency {
            font-size: 2.2rem;
            color: var(--sber-neon);
            margin-left: 10px;
            font-weight: 400;
        }

        /* Главная кнопка действия (Премиум Неон) */
        .btn-pay {
            background: linear-gradient(135deg, #00ff87 0%, #006334 100%);
            background-size: 200% auto;
            color: #030712;
            border: none;
            padding: 22px;
            border-radius: 22px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 30px -5px rgba(0, 255, 135, 0.25);
            letter-spacing: 0.5px;
        }

        .btn-pay:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(0, 255, 135, 0.1);
            filter: brightness(1.1);
        }

        /* Элитная Клавиатура */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex: 1;
        }

        .key {
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 500;
            border-radius: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .key:active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(0.94);
        }

        .key.action {
            background: rgba(239, 68, 68, 0.06);
            border-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            font-size: 1.5rem;
        }
        .key.action:active {
            background: rgba(239, 68, 68, 0.15);
        }

        /* Сетка выбора способов оплаты */
        .methods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
            margin-top: 10px;
        }

        .method-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.005) 100%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .method-card:active {
            border-color: var(--sber-emerald);
            background: rgba(16, 185, 129, 0.04);
            transform: scale(0.95);
        }

        .method-icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 12px rgba(255,255,255,0.1));
        }
        .method-name { font-size: 0.95rem; font-weight: 500; color: #d1d5db; text-align: center; }

        /* Процесс обработки и Спиннер */
        .process-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        /* Крутой вращающийся индикатор Сбера */
        .sber-spinner {
            width: 150px;
            height: 150px;
            border: 3px solid rgba(255, 255, 255, 0.02);
            border-top: 3px solid var(--sber-neon);
            border-right: 3px solid var(--cyber-blue);
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner-inner {
            width: 124px;
            height: 124px;
            background: #0d1117;
            border-radius: 50%;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.2rem;
            animation: counter-spin 1.2s linear infinite;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.6);
        }

        /* Сканирование лица */
        .face-scan-line {
            position: absolute;
            width: 85%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--sber-neon), transparent);
            box-shadow: 0 0 20px var(--sber-neon);
            top: 10%;
            animation: scan 2.5s ease-in-out infinite;
            display: none;
            z-index: 10;
        }

        /* Сгенерированный нормальный QR код */
        .qr-wrapper {
            background: #ffffff;
            padding: 16px;
            border-radius: 28px;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .qr-wrapper img {
            display: block;
        }

        /* Экран успешной транзакции */
        .success-screen {
            background: linear-gradient(180deg, var(--bg-dark) 0%, #031c11 100%);
        }

        .success-glow-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--sber-neon) 0%, #047857 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0, 255, 135, 0.35);
            transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .screen.active .success-glow-circle { transform: scale(1); }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-dim);
            padding: 14px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-back:active { background: rgba(255, 255, 255, 0.03); color: #fff; }

        /* Кнопка активации звука/музыки при старте */
        .audio-prompt {
            position: absolute;
            inset: 0;
            background: #060709;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 30px;
            text-align: center;
        }

        /* Ключевые анимации */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes counter-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        @keyframes scan { 0%, 100% { top: 15%; opacity: 0.2; } 50% { top: 85%; opacity: 1; } }
        @keyframes scaleUp { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="audio-prompt" id="audio-screen">
        <div class="sber-ic" style="width: 50px; height: 50px; font-size: 24px;"></div>
        <h2>CyberTerminal OS</h2>
        <p style="color: var(--text-dim); font-size: 0.95rem;">Для включения анимаций, фонового кибер-звука и процессинга нажмите кнопку ниже</p>
        <button class="btn-pay" style="width: 100%; max-width: 280px;" onclick="initTerminalWithAudio()">Запустить систему</button>
    </div>

    <div class="terminal">
        
        <div id="screen-amount" class="screen active">
            <div class="top-block">
                <div class="header">
                    <div class="sber-ic"></div>
                    <h1>SberPay Premium</h1>
                </div>
                <div class="display-container">
                    <div class="amount-display"><span id="sum-value">0</span><span class="currency">₽</span></div>
                </div>
                <button class="btn-pay" onclick="goToMethods()">Выбрать метод оплаты →</button>
            </div>

            <div class="keyboard">
                <button class="key" onclick="appendNum('1')">1</button>
                <button class="key" onclick="appendNum('2')">2</button>
                <button class="key" onclick="appendNum('3')">3</button>
                <button class="key" onclick="appendNum('4')">4</button>
                <button class="key" onclick="appendNum('5')">5</button>
                <button class="key" onclick="appendNum('6')">6</button>
                <button class="key" onclick="appendNum('7')">7</button>
                <button class="key" onclick="appendNum('8')">8</button>
                <button class="key" onclick="appendNum('9')">9</button>
                <button class="key action" onclick="clearSum()">C</button>
                <button class="key" onclick="appendNum('0')">0</button>
                <button class="key" onclick="appendNum('.')">.</button>
            </div>
        </div>

        <div id="screen-methods" class="screen right">
            <div class="header">
                <div class="sber-ic"></div>
                <h1>Способ оплаты</h1>
            </div>
            <div style="text-align: center; margin: 20px 0; font-size: 2.2rem; font-weight: 600;" id="methods-sum">0 ₽</div>
            
            <div class="methods-grid">
                <div class="method-card" onclick="startProcess('nfc')">
                    <div class="method-icon">💳</div>
                    <div class="method-name">Карта / Телефон</div>
                </div>
                <div class="method-card" onclick="startProcess('face')">
                    <div class="method-icon">👤</div>
                    <div class="method-name">Улыбка (Face ID)</div>
                </div>
                <div class="method-card" onclick="startProcess('qr')">
                    <div class="method-icon">🟩</div>
                    <div class="method-name">SberPay QR</div>
                </div>
                <div class="method-card" onclick="startProcess('sbp')">
                    <div class="method-icon">🔄</div>
                    <div class="method-name">Система СБП</div>
                </div>
            </div>
            <button class="btn-back" onclick="goBackToAmount()">← Изменить сумму</button>
        </div>

        <div id="screen-process" class="screen right">
            <div class="header">
                <div class="sber-ic"></div>
                <h1 id="process-title">Обработка...</h1>
            </div>
            
            <div class="process-container">
                <div class="amount-display" id="process-sum" style="font-size: 2.4rem;">0 ₽</div>
                
                <div class="sber-spinner" id="main-spinner">
                    <div class="spinner-inner" id="spinner-icon">💳</div>
                    <div class="face-scan-line" id="scan-line"></div>
                </div>

                <div class="qr-wrapper" id="qr-code-container">
                    <div id="qrcode"></div>
                </div>

                <div style="text-align: center; width: 100%; padding: 0 10px;">
                    <div id="process-status" style="color: var(--text-dim); font-size: 1rem; margin-bottom: 20px; min-height: 48px;">Ожидание...</div>
                    <button class="btn-pay" style="font-size: 0.95rem; padding: 14px; width: 100%; background: rgba(255,255,255,0.05); color: #fff; box-shadow: none;" onclick="triggerSuccess()">Подтвердить транзакцию ✓</button>
                </div>
            </div>
        </div>

        <div id="screen-success" class="screen right success-screen">
            <div class="success-glow-circle">
                <span style="font-size: 3.5rem; color: #060709; font-weight: bold;">✓</span>
            </div>
            <div style="text-align: center;">
                <h2 style="font-size: 1.8rem; font-weight: 600; margin-bottom: 6px;">Оплачено</h2>
                <p style="color: var(--text-dim); font-size: 1rem; margin-bottom: 20px;">Электронный чек сформирован</p>
                <div class="amount-display" id="final-sum" style="font-size: 3.2rem; color: var(--sber-neon);">0.00 ₽</div>
            </div>
            <button class="btn-pay" style="width: 100%; background: linear-gradient(135deg, #00ff87 0%, #047857 100%);" onclick="resetTerminal()">Завершить сессию</button>
        </div>

    </div>

    <script>
        let currentSum = "0";
        const screens = {
            amount: document.getElementById('screen-amount'),
            methods: document.getElementById('screen-methods'),
            process: document.getElementById('screen-process'),
            success: document.getElementById('screen-success')
        };
        
        let abortController = null;
        let qrCodeInstance = null;
        let audioCtx = null;
        let ambientOscillator = null;

        // Инициализация звуковой подсистемы по клику
        function initTerminalWithAudio() {
            document.getElementById('audio-screen').style.display = 'none';
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startAmbientNoise(); // Включаем легкий фоновый хайтек гул
            } catch (e) { console.log("Audio не поддерживается"); }
        }

        // Синтезируем легкий фоновый космический/процессорный эмбиент
        function startAmbientNoise() {
            try {
                ambientOscillator = audioCtx.createOscillator();
                let ambientGain = audioCtx.createGain();
                ambientOscillator.type = 'sine';
                ambientOscillator.frequency.setValueAtTime(60, audioCtx.currentTime); // Низкий басовый гул
                ambientGain.gain.setValueAtTime(0.01, audioCtx.currentTime); // Очень тихий
                ambientOscillator.connect(ambientGain);
                ambientGain.connect(audioCtx.destination);
                ambientOscillator.start();
            } catch(e){}
        }

        function updateDisplay() {
            document.getElementById('sum-value').innerText = currentSum;
        }

        function appendNum(num) {
            if (currentSum === "0" && num !== ".") currentSum = num;
            else {
                if (num === "." && currentSum.includes(".")) return;
                currentSum += num;
            }
            updateDisplay();
            playClickSound();
        }

        function clearSum() { currentSum = "0"; updateDisplay(); playClickSound(); }

        function goToMethods() {
            if (parseFloat(currentSum) <= 0) return;
            document.getElementById('methods-sum').innerText = currentSum + " ₽";
            screens.amount.className = "screen left";
            screens.methods.className = "screen active";
            playClickSound();
        }

        function goBackToAmount() {
            screens.methods.className = "screen right";
            screens.amount.className = "screen active";
            playClickSound();
        }

        function startProcess(type) {
            screens.methods.className = "screen left";
            screens.process.className = "screen active";
            playClickSound();
            
            document.getElementById('process-sum').innerText = currentSum + " ₽";
            
            // Сброс интерфейсов процессинга
            document.getElementById('main-spinner').style.display = "flex";
            document.getElementById('qr-code-container').style.display = "none";
            document.getElementById('scan-line').style.display = "none";

            if (type === 'nfc') {
                document.getElementById('process-title').innerText = "Бесконтактная оплата";
                document.getElementById('spinner-icon').innerText = "💳";
                document.getElementById('process-status').innerText = "Приложите карту или смартфон с NFC";
                startNFC();
            } 
            else if (type === 'face') {
                document.getElementById('process-title').innerText = "Оплата по улыбке";
                document.getElementById('spinner-icon').innerText = "👤";
                document.getElementById('scan-line').style.display = "block";
                document.getElementById('process-status').innerText = "Распознавание биометрии лица...";
                setTimeout(triggerSuccess, 3500); // Имитация сканирования лица
            } 
            else if (type === 'qr' || type === 'sbp') {
                document.getElementById('process-title').innerText = type === 'qr' ? "SberPay QR" : "Оплата через СБП";
                document.getElementById('main-spinner').style.display = "none";
                document.getElementById('qr-code-container').style.display = "block";
                document.getElementById('process-status').innerText = "Отсканируйте сгенерированный QR-код камерой смартфона";
                
                // ГЕНЕРАЦИЯ НАСТОЯЩЕГО QR-КОДА НА ЛЕТУ
                const qrContainer = document.getElementById("qrcode");
                qrContainer.innerHTML = ""; // Чистим старый QR
                qrCodeInstance = new QRCode(qrContainer, {
                    text: `https://mock-sberpay-link.ru/pay?amount=${currentSum}`,
                    width: 150,
                    height: 150,
                    colorDark : "#060709",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }

        // Web NFC механика
        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    abortController = new AbortController();
                    const ndef = new NDEFReader();
                    await ndef.scan({ signal: abortController.signal });
                    ndef.onreading = () => {
                        if (navigator.vibrate) navigator.vibrate(200);
                        triggerSuccess();
                    };
                } catch (e) { console.log("NFC активен в фоне"); }
            }
        }

        function triggerSuccess() {
            if (abortController) abortController.abort();
            document.getElementById('final-sum').innerText = parseFloat(currentSum).toFixed(2) + " ₽";
            
            screens.process.className = "screen left";
            screens.success.className = "screen active";
            playSuccessBeep();
        }

        function resetTerminal() {
            currentSum = "0";
            updateDisplay();
            screens.success.className = "screen right";
            screens.amount.className = "screen active";
            playClickSound();
        }

        // Звук легкого технологичного клика по кнопкам
        function playClickSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.05);
                setTimeout(() => osc.stop(), 50);
            } catch(e){}
        }

        // Плотный дорогой фирменный "Пик" успешной оплаты
        function playSuccessBeep() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                // Сначала короткий тихий полутон, затем чистый высокий тон успеха
                osc.frequency.setValueAtTime(950, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1250, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.35);
                setTimeout(() => osc.stop(), 350);
            } catch(e){}
        }
    </script>
</body>
            </html>
