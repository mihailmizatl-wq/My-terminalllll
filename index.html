<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTerminal</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --panel-bg: #1a1c29;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --success-color: #10b981;
            --text-color: #ffffff;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Контейнер терминала с эффектом стекла */
        .terminal {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 800px;
            background: var(--panel-bg);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        /* Общий стиль для экранов (окон) */
        .screen {
            position: absolute;
            inset: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s;
            opacity: 0;
            pointer-events: none;
        }

        /* Состояния экранов для плавного переплыва */
        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }

        .screen.left {
            transform: translateX(-100%) scale(0.9);
        }

        .screen.right {
            transform: translateX(100%) scale(0.9);
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-top: 10px;
        }

        .header h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* ЭКРАН 1: Ввод суммы */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .amount-display {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .currency {
            font-size: 2rem;
            color: var(--text-color);
            margin-left: 5px;
        }

        /* Кастомная клавиатура */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .key {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 1.5rem;
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .key:active {
            background: var(--accent-color);
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .key.action {
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-color);
        }

        .btn-pay {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-pay:hover { background: var(--accent-hover); }

        /* ЭКРАН 2: Ожидание NFC */
        .nfc-animation-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        /* Пульсирующие волны NFC */
        .nfc-wave {
            width: 100px;
            height: 100px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .nfc-wave::before, .nfc-wave::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            animation: pulse 2s infinite ease-out;
        }

        .nfc-wave::after { animation-delay: 1s; }

        .nfc-icon {
            font-size: 2.5rem;
            animation: float 3s infinite ease-in-out;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: center;
            animation: blink 1.5s infinite;
        }

        /* ЭКРАН 3: Успех */
        .success-screen {
            background: linear-gradient(135deg, #0d0e15 0%, #062016 100%);
        }

        .success-icon-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .checkmark-circle {
            width: 120px;
            height: 120px;
            background: rgba(16, 185, 129, 0.1);
            border: 3px solid var(--success-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen.active .checkmark-circle {
            transform: scale(1);
        }

        .checkmark {
            font-size: 4rem;
            color: var(--success-color);
        }

        /* Анимации */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Кнопка ручного теста для ПК / айфонов */
        .fallback-btn {
            background: transparent;
            border: 1px dashed var(--text-muted);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="terminal">
        
        <div id="screen-amount" class="screen active">
            <div class="header">
                <h1>Cyber Terminal</h1>
            </div>
            <div class="display-container">
                <div class="amount-display"><span id="sum-value">0</span><span class="currency">₽</span></div>
            </div>
            <div class="keyboard">
                <button class="key" onclick="appendNum('1')">1</button>
                <button class="key" onclick="appendNum('2')">2</button>
                <button class="key" onclick="appendNum('3')">3</button>
                <button class="key" onclick="appendNum('4')">4</button>
                <button class="key" onclick="appendNum('5')">5</button>
                <button class="key" onclick="appendNum('6')">6</button>
                <button class="key" onclick="appendNum('7')">7</button>
                <button class="key" onclick="appendNum('8')">8</button>
                <button class="key" onclick="appendNum('9')">9</button>
                <button class="key action" onclick="clearSum()">C</button>
                <button class="key" onclick="appendNum('0')">0</button>
                <button class="key action" onclick="appendNum('.')">.</button>
            </div>
            <button class="btn-pay" onclick="goToNfc()">К оплате</button>
        </div>

        <div id="screen-nfc" class="screen right">
            <div class="header">
                <h1>Оплата</h1>
            </div>
            <div class="nfc-animation-container">
                <div class="amount-display" id="target-sum">0 ₽</div>
                <div class="nfc-wave">
                    <div class="nfc-icon">📱</div>
                </div>
                <div class="status-text" id="nfc-status">Приложите карту или телефон</div>
            </div>
            <button class="fallback-btn" onclick="triggerSuccess()">Симулировать касание (без NFC)</button>
        </div>

        <div id="screen-success" class="screen right success-screen">
            <div class="success-icon-box">
                <div class="checkmark-circle">
                    <div class="checkmark">✓</div>
                </div>
                <h2>Оплачено успешно</h2>
                <p style="color: var(--text-muted);" id="final-sum">0.00 ₽</p>
            </div>
            <button class="btn-pay" style="background: var(--success-color);" onclick="resetTerminal()">Новый платеж</button>
        </div>

    </div>

    <script>
        let currentSum = "0";
        const screenAmount = document.getElementById('screen-amount');
        const screenNfc = document.getElementById('screen-nfc');
        const screenSuccess = document.getElementById('screen-success');
        
        let ndef = null;
        let abortController = null;

        // Логика клавиатуры
        function updateDisplay() {
            document.getElementById('sum-value').innerText = currentSum;
        }

        function appendNum(num) {
            if (currentSum === "0" && num !== ".") {
                currentSum = num;
            } else {
                if (num === "." && currentSum.includes(".")) return;
                currentSum += num;
            }
            updateDisplay();
        }

        function clearSum() {
            currentSum = "0";
            updateDisplay();
        }

        // Переплыв на экран NFC
        function goToNfc() {
            if (parseFloat(currentSum) <= 0) {
                alert("Введите сумму больше 0");
                return;
            }
            document.getElementById('target-sum').innerText = currentSum + " ₽";
            
            screenAmount.className = "screen left";
            screenNfc.className = "screen active";

            startNFC();
        }

        // Активация датчика NFC
        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    abortController = new AbortController();
                    ndef = new NDEFReader();
                    await ndef.scan({ signal: abortController.signal });
                    
                    document.getElementById('nfc-status').innerText = "Датчик готов, поднесите карту...";
                    
                    ndef.onreading = event => {
                        // Карта обнаружена! Вибрируем и переходим к успеху
                        if (navigator.vibrate) navigator.vibrate(200);
                        triggerSuccess();
                    };

                } catch (error) {
                    console.log("NFC Error: " + error);
                    document.getElementById('nfc-status').innerText = "NFC доступен, но не активирован";
                }
            } else {
                document.getElementById('nfc-status').innerText = "NFC не поддерживается вашим браузером (используйте кнопку теста)";
            }
        }

        // Переплыв на экран Успеха
        function triggerSuccess() {
            // Останавливаем сканирование NFC
            if (abortController) {
                abortController.abort();
            }

            document.getElementById('final-sum').innerText = parseFloat(currentSum).toFixed(2) + " ₽";
            
            screenNfc.className = "screen left";
            screenSuccess.className = "screen active";
            
            // Звуковой сигнал успеха (синтезированный писк терминала)
            playBeep();
        }

        // Сброс терминала в начало
        function resetTerminal() {
            currentSum = "0";
            updateDisplay();
            screenSuccess.className = "screen right";
            screenAmount.className = "screen active";
        }

        // Звук пикания терминала
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); // Высокий писк
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

                oscillator.start();
                setTimeout(() => oscillator.stop(), 150); // Короткий писк на 150мс
            } catch(e) {
                console.log("Audio API не поддерживается");
            }
        }
    </script>
</body>
                  </html>
