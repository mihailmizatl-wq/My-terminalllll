<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sber Terminal Cyber Edition</title>
    <style>
        :root {
            --bg-color: #0a0f0d;
            --panel-bg: #111814;
            --sber-green: #21a038;
            --sber-gradient: linear-gradient(135deg, #21a038 0%, #047857 100%);
            --accent-glow: rgba(33, 160, 56, 0.3);
            --text-color: #ffffff;
            --text-muted: #4b5563;
            --card-bg: rgba(255, 255, 255, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .terminal {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            background: var(--panel-bg);
            border-radius: 32px;
            position: relative;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 0 0 50px rgba(33, 160, 56, 0.05);
            overflow: hidden;
            border: 1px solid rgba(33, 160, 56, 0.1);
            display: flex;
            flex-direction: column;
        }

        .screen {
            position: absolute;
            inset: 0;
            padding: 25px;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            opacity: 0;
            pointer-events: none;
            background: var(--panel-bg);
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }

        .screen.left { transform: translateX(-100%) scale(0.95); }
        .screen.right { transform: translateX(100%) scale(0.95); }

        /* ВЕРХНИЙ БЛОК (Ввод суммы) */
        .top-block {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
        }

        .sber-logo {
            width: 24px;
            height: 24px;
            background: var(--sber-gradient);
            border-radius: 50%;
            position: relative;
        }
        .sber-logo::after {
            content: '✓';
            position: absolute;
            color: #0a0f0d;
            font-weight: bold;
            font-size: 14px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #e5e7eb;
        }

        .display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            border: 1px solid rgba(23, 42, 30, 1);
        }

        .amount-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 25px rgba(33, 160, 56, 0.2);
        }

        .currency {
            font-size: 2.2rem;
            color: var(--sber-green);
            margin-left: 8px;
        }

        .btn-pay {
            background: var(--sber-gradient);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 25px -5px rgba(33, 160, 56, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-pay:active {
            transform: scale(0.97);
            filter: brightness(1.2);
        }

        /* КЛАВИАТУРА */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            flex: 1;
        }

        .key {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-color);
            font-size: 1.7rem;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .key:active {
            background: rgba(33, 160, 56, 0.2);
            border-color: var(--sber-green);
            transform: scale(0.92);
        }

        .key.action {
            background: rgba(220, 38, 38, 0.15);
            color: #ef4444;
        }

        /* ЭКРАН С ПОСОБАМИ ОПЛАТЫ */
        .menu-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #9ca3af;
        }

        .methods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex: 1;
        }

        .method-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .method-card:active {
            background: rgba(33, 160, 56, 0.1);
            border-color: var(--sber-green);
            transform: scale(0.95);
        }

        .method-icon { font-size: 2.5rem; }
        .method-name { font-size: 1rem; font-weight: 600; text-align: center;}

        /* ЭКРАН ПРОЦЕССА ОПЛАТЫ (КРУЖОК И СЛИТЫЕ МЕХАНИКИ) */
        .process-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
        }

        /* Анимация крутящегося сбер-круга */
        .sber-spinner {
            width: 140px;
            height: 140px;
            border: 4px solid rgba(255, 255, 255, 0.03);
            border-top: 4px solid var(--sber-green);
            border-right: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner-inner {
            width: 110px;
            height: 110px;
            background: var(--panel-bg);
            border-radius: 50%;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            animation: counter-spin 1s linear infinite;
        }

        /* Экраны функций */
        .face-scan-line {
            position: absolute;
            width: 80%;
            height: 2px;
            background: var(--sber-green);
            box-shadow: 0 0 15px var(--sber-green);
            top: 10%;
            animation: scan 2s ease-in-out infinite;
            display: none;
        }

        .qr-mock {
            width: 180px;
            height: 180px;
            background: white;
            padding: 10px;
            border-radius: 16px;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 7rem;
            color: black;
        }

        /* ЭКРАН УСПЕХА */
        .success-screen {
            background: linear-gradient(135deg, #0a0f0d 0%, #052e16 100%);
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .sber-check {
            width: 110px;
            height: 110px;
            background: var(--sber-gradient);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(33, 160, 56, 0.4);
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen.active .sber-check { transform: scale(1); }

        /* АНИМАЦИИ */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes counter-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        @keyframes scan { 0%, 100% { top: 15%; opacity: 0.3; } 50% { top: 85%; opacity: 1; } }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #9ca3af;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="terminal">
        
        <div id="screen-amount" class="screen active">
            <div class="top-block">
                <div class="header">
                    <div class="sber-logo"></div>
                    <h1>SberPay Terminal</h1>
                </div>
                <div class="display-container">
                    <div class="amount-display"><span id="sum-value">0</span><span class="currency">₽</span></div>
                </div>
                <button class="btn-pay" onclick="goToMethods()">Выбрать оплату →</button>
            </div>

            <div class="keyboard">
                <button class="key" onclick="appendNum('1')">1</button>
                <button class="key" onclick="appendNum('2')">2</button>
                <button class="key" onclick="appendNum('3')">3</button>
                <button class="key" onclick="appendNum('4')">4</button>
                <button class="key" onclick="appendNum('5')">5</button>
                <button class="key" onclick="appendNum('6')">6</button>
                <button class="key" onclick="appendNum('7')">7</button>
                <button class="key" onclick="appendNum('8')">8</button>
                <button class="key" onclick="appendNum('9')">9</button>
                <button class="key action" onclick="clearSum()">C</button>
                <button class="key" onclick="appendNum('0')">0</button>
                <button class="key" onclick="appendNum('.')">.</button>
            </div>
        </div>

        <div id="screen-methods" class="screen right">
            <div class="header">
                <div class="sber-logo"></div>
                <h1>Способ оплаты</h1>
            </div>
            <div style="text-align: center; margin: 15px 0; font-size: 1.8rem; font-weight: 700;" id="methods-sum">0 ₽</div>
            
            <div class="methods-grid">
                <div class="method-card" onclick="startProcess('nfc')">
                    <div class="method-icon">💳</div>
                    <div class="method-name">Картой / NFC</div>
                </div>
                <div class="method-card" onclick="startProcess('face')">
                    <div class="method-icon">👤</div>
                    <div class="method-name">Оплата улыбкой</div>
                </div>
                <div class="method-card" onclick="startProcess('qr')">
                    <div class="method-icon">📱</div>
                    <div class="method-name">SberPay QR</div>
                </div>
                <div class="method-card" onclick="startProcess('sbp')">
                    <div class="method-icon">🔄</div>
                    <div class="method-name">через СБП</div>
                </div>
            </div>
            <button class="btn-back" onclick="goBackToAmount()">← Назад к сумме</button>
        </div>

        <div id="screen-process" class="screen right">
            <div class="header">
                <div class="sber-logo"></div>
                <h1 id="process-title">Обработка...</h1>
            </div>
            
            <div class="process-container">
                <div class="amount-display" id="process-sum" style="font-size: 2.2rem;">0 ₽</div>
                
                <div class="sber-spinner" id="main-spinner">
                    <div class="spinner-inner" id="spinner-icon">💳</div>
                    <div class="face-scan-line" id="scan-line"></div>
                </div>

                <div class="qr-mock" id="qr-code">▚▞</div>

                <div style="text-align: center; width: 100%;">
                    <div class="status-text" id="process-status" style="color: #9ca3af; margin-bottom: 15px;">Ожидание действия...</div>
                    <button class="btn-pay" style="font-size: 1rem; padding: 12px;" onclick="triggerSuccess()">Симулировать успех ✓</button>
                </div>
            </div>
        </div>

        <div id="screen-success" class="screen right success-screen">
            <div class="sber-check">
                <span style="font-size: 4rem; color: #fff;">✓</span>
            </div>
            <div style="text-align: center;">
                <h2 style="font-size: 1.8rem; margin-bottom: 5px;">Готово!</h2>
                <p style="color: #9ca3af; font-size: 1.1rem; margin-bottom: 15px;">Операция прошла успешно</p>
                <div class="amount-display" id="final-sum" style="font-size: 3rem; color: var(--sber-green);">0.00 ₽</div>
            </div>
            <button class="btn-pay" style="width: 80%; background: var(--sber-gradient);" onclick="resetTerminal()">Новая операция</button>
        </div>

    </div>

    <script>
        let currentSum = "0";
        const screens = {
            amount: document.getElementById('screen-amount'),
            methods: document.getElementById('screen-methods'),
            process: document.getElementById('screen-process'),
            success: document.getElementById('screen-success')
        };
        
        let abortController = null;
        let ndef = null;

        function updateDisplay() {
            document.getElementById('sum-value').innerText = currentSum;
        }

        function appendNum(num) {
            if (currentSum === "0" && num !== ".") currentSum = num;
            else {
                if (num === "." && currentSum.includes(".")) return;
                currentSum += num;
            }
            updateDisplay();
        }

        function clearSum() { currentSum = "0"; updateDisplay(); }

        function goToMethods() {
            if (parseFloat(currentSum) <= 0) { alert("Введите сумму"); return; }
            document.getElementById('methods-sum').innerText = currentSum + " ₽";
            screens.amount.className = "screen left";
            screens.methods.className = "screen active";
        }

        function goBackToAmount() {
            screens.methods.className = "screen right";
            screens.amount.className = "screen active";
        }

        // Запуск конкретного режима оплаты
        function startProcess(type) {
            screens.methods.className = "screen left";
            screens.process.className = "screen active";
            
            document.getElementById('process-sum').innerText = currentSum + " ₽";
            
            // Сброс видимости элементов
            document.getElementById('main-spinner').style.display = "flex";
            document.getElementById('qr-code').style.display = "none";
            document.getElementById('scan-line').style.display = "none";

            if (type === 'nfc') {
                document.getElementById('process-title').innerText = "Оплата картой";
                document.getElementById('spinner-icon').innerText = "💳";
                document.getElementById('process-status').innerText = "Приложите карту или телефон к устройству";
                startNFC();
            } 
            else if (type === 'face') {
                document.getElementById('process-title').innerText = "Оплата улыбкой";
                document.getElementById('spinner-icon').innerText = "👤";
                document.getElementById('scan-line').style.display = "block";
                document.getElementById('process-status').innerText = "Смотрите в камеру терминала...";
                // Автоматический успех через 3 секунды «сканирования лица»
                setTimeout(triggerSuccess, 3000);
            } 
            else if (type === 'qr' || type === 'sbp') {
                document.getElementById('process-title').innerText = type === 'qr' ? "SberPay QR" : "Оплата через СБП";
                document.getElementById('main-spinner').style.display = "none";
                document.getElementById('qr-code').style.display = "flex";
                document.getElementById('process-status').innerText = "Сканируйте QR-код вашим телефоном";
            }
        }

        // Web NFC
        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    abortController = new AbortController();
                    ndef = new NDEFReader();
                    await ndef.scan({ signal: abortController.signal });
                    ndef.onreading = () => {
                        if (navigator.vibrate) navigator.vibrate(200);
                        triggerSuccess();
                    };
                } catch (e) {
                    console.log("NFC запущен в режиме ожидания касания");
                }
            }
        }

        function triggerSuccess() {
            if (abortController) abortController.abort();
            document.getElementById('final-sum').innerText = parseFloat(currentSum).toFixed(2) + " ₽";
            
            screens.process.className = "screen left";
            screens.success.className = "screen active";
            playBeep();
        }

        function resetTerminal() {
            currentSum = "0";
            updateDisplay();
            screens.success.className = "screen right";
            screens.amount.className = "screen active";
        }

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // Сберовский приятный тон
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                setTimeout(() => oscillator.stop(), 200);
            } catch(e) {}
        }
    </script>
</body>
            </html>
