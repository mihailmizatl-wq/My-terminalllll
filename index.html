<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SberPay Cyber Terminal Luxury</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #05070a;
            --panel-bg: rgba(13, 17, 23, 0.85);
            --sber-neon: #00ff87;
            --sber-emerald: #059669;
            --cyber-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #4b5563;
            --border-glow: rgba(0, 255, 135, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 20%, #0d1e16 0%, var(--bg-dark) 80%);
        }

        /* Корпус терминала с неоновой обводкой */
        .terminal {
            width: 100%;
            max-width: 410px;
            height: 100vh;
            max-height: 840px;
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.9), 0 0 60px rgba(0, 255, 135, 0.03);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }

        /* Эффект «живой» неоновой нити по контуру */
        .terminal::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), var(--border-glow), transparent, rgba(255,255,255,0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Плавные переплывы окон */
        .screen {
            position: absolute;
            inset: 0;
            padding: 35px 25px;
            display: flex;
            flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            opacity: 0;
            pointer-events: none;
            background: transparent;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0) scale(1);
        }

        .screen.left { transform: translateX(-100%) scale(0.96); opacity: 0; }
        .screen.right { transform: translateX(100%) scale(0.96); opacity: 0; }

        /* Верхняя плашка ввода */
        .top-block {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .sber-ic {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--sber-neon) 0%, var(--sber-emerald) 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.3);
        }
        .sber-ic::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 9px;
            border: solid #05070a;
            border-width: 0 2px 2px 0;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .header h1 {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #9ca3af;
        }

        .display-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.5);
        }

        .amount-display {
            font-size: 3.8rem;
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .currency {
            font-size: 2.4rem;
            color: var(--sber-neon);
            margin-left: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 135, 0.4);
        }

        /* Премиальная интерактивная кнопка */
        .btn-pay {
            background: linear-gradient(135deg, var(--sber-neon) 0%, #006334 100%);
            color: #030712;
            border: none;
            padding: 22px;
            border-radius: 22px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px -5px rgba(0, 255, 135, 0.3);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-pay:active {
            transform: scale(0.97);
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(0, 255, 135, 0.1);
        }

        /* Сенсорная hi-tech клавиатура */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex: 1;
        }

        .key {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            font-size: 1.9rem;
            font-weight: 400;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .key:active {
            background: rgba(0, 255, 135, 0.08);
            border-color: rgba(0, 255, 135, 0.3);
            text-shadow: 0 0 10px var(--sber-neon);
            transform: scale(0.93);
        }

        .key.action {
            background: rgba(239, 68, 68, 0.03);
            border-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .key.action:active {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
        }

        /* Меню выбора методов (Без смайликов) */
        .methods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            flex: 1;
            margin-top: 15px;
        }

        .method-card {
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 28px;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .method-card svg {
            width: 42px;
            height: 42px;
            fill: none;
            stroke: #9ca3af;
            stroke-width: 1.5;
            transition: all 0.25s;
        }

        .method-card:active {
            border-color: var(--sber-neon);
            background: rgba(0, 255, 135, 0.03);
            box-shadow: 0 10px 25px -5px rgba(0, 255, 135, 0.1);
            transform: scale(0.95);
        }

        .method-card:active svg {
            stroke: var(--sber-neon);
            filter: drop-shadow(0 0 8px var(--sber-neon));
        }

        .method-name { font-size: 0.95rem; font-weight: 500; color: #d1d5db; text-align: center; }

        /* Процессинг и Анимации */
        .process-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }

        .sber-spinner {
            width: 160px;
            height: 160px;
            border: 2px solid rgba(255, 255, 255, 0.01);
            border-top: 3px solid var(--sber-neon);
            border-right: 3px solid var(--cyber-blue);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner-inner {
            width: 134px;
            height: 134px;
            background: #0a0d13;
            border-radius: 50%;
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
        }

        .spinner-inner svg {
            width: 50px;
            height: 50px;
            stroke: #fff;
            stroke-width: 1.5;
            fill: none;
        }

        /* Лазерный сканер лица */
        .face-scan-line {
            position: absolute;
            width: 85%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--sber-neon), transparent);
            box-shadow: 0 0 25px var(--sber-neon);
            top: 10%;
            animation: scan 2.5s ease-in-out infinite;
            display: none;
            z-index: 10;
        }

        /* Генератор QR */
        .qr-wrapper {
            background: #ffffff;
            padding: 18px;
            border-radius: 32px;
            display: none;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Экран Успеха */
        .success-screen {
            background: linear-gradient(180deg, var(--bg-dark) 0%, #021a10 100%);
        }

        .success-glow-circle {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--sber-neon) 0%, var(--sber-emerald) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0, 255, 135, 0.4);
            transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-glow-circle svg {
            width: 50px;
            height: 50px;
            stroke: #05070a;
            stroke-width: 3;
            fill: none;
        }
        .screen.active .success-glow-circle { transform: scale(1); }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #6b7280;
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-back:active { background: rgba(255, 255, 255, 0.02); color: #fff; }

        /* Система разблокировки аудио-движка */
        .audio-prompt {
            position: absolute;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 30px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scan { 0%, 100% { top: 15%; opacity: 0.2; } 50% { top: 85%; opacity: 1; } }
        @keyframes scaleUp { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="audio-prompt" id="audio-screen">
        <div class="sber-ic" style="width: 55px; height: 55px;"></div>
        <h2 style="font-weight: 500; font-size: 1.5rem;">SberPay Cyber OS</h2>
        <p style="color: #6b7280; font-size: 0.95rem; text-align: center; max-width: 290px;">Нажмите для безопасного запуска аудио-драйверов терминала и графических шейдеров.</p>
        <button class="btn-pay" style="width: 100%; max-width: 280px;" onclick="initTerminalWithAudio()">Инициализация</button>
    </div>

    <div class="terminal">
        
        <div id="screen-amount" class="screen active">
            <div class="top-block">
                <div class="header">
                    <div class="sber-ic"></div>
                    <h1>SberPay Luxury</h1>
                </div>
                <div class="display-container">
                    <div class="amount-display"><span id="sum-value">0</span><span class="currency">₽</span></div>
                </div>
                <button class="btn-pay" onclick="goToMethods()">Выбрать способ оплаты →</button>
            </div>

            <div class="keyboard">
                <button class="key" onclick="appendNum('1')">1</button>
                <button class="key" onclick="appendNum('2')">2</button>
                <button class="key" onclick="appendNum('3')">3</button>
                <button class="key" onclick="appendNum('4')">4</button>
                <button class="key" onclick="appendNum('5')">5</button>
                <button class="key" onclick="appendNum('6')">6</button>
                <button class="key" onclick="appendNum('7')">7</button>
                <button class="key" onclick="appendNum('8')">8</button>
                <button class="key" onclick="appendNum('9')">9</button>
                <button class="key action" onclick="clearSum()">C</button>
                <button class="key" onclick="appendNum('0')">0</button>
                <button class="key" onclick="appendNum('.')">.</button>
            </div>
        </div>

        <div id="screen-methods" class="screen right">
            <div class="header">
                <div class="sber-ic"></div>
                <h1>Способ оплаты</h1>
            </div>
            <div style="text-align: center; margin: 25px 0; font-size: 2.4rem; font-weight: 600;" id="methods-sum">0 ₽</div>
            
            <div class="methods-grid">
                <div class="method-card" onclick="startProcess('nfc')">
                    <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    <div class="method-name">Карта или телефон</div>
                </div>
                <div class="method-card" onclick="startProcess('face')">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <div class="method-name">Оплата улыбкой</div>
                </div>
                <div class="method-card" onclick="startProcess('qr')">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <div class="method-name">SberPay QR</div>
                </div>
                <div class="method-card" onclick="startProcess('sbp')">
                    <svg viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    <div class="method-name">Система СБП</div>
                </div>
            </div>
            <button class="btn-back" onclick="goBackToAmount()">← Вернуться к изменению суммы</button>
        </div>

        <div id="screen-process" class="screen right">
            <div class="header">
                <div class="sber-ic"></div>
                <h1 id="process-title">Обработка</h1>
            </div>
            
            <div class="process-container">
                <div class="amount-display" id="process-sum" style="font-size: 2.4rem;">0 ₽</div>
                
                <div class="sber-spinner" id="main-spinner">
                    <div class="spinner-inner" id="dynamic-icon-holder">
                        </div>
                    <div class="face-scan-line" id="scan-line"></div>
                </div>

                <div class="qr-wrapper" id="qr-code-container">
                    <div id="qrcode"></div>
                </div>

                <div style="text-align: center; width: 100%;">
                    <div id="process-status" style="color: #6b7280; font-size: 0.95rem; margin-bottom: 25px; min-height: 40px;">Авторизация...</div>
                    <button class="btn-pay" style="font-size: 0.95rem; padding: 14px; width: 100%; background: rgba(255,255,255,0.02); color: #fff; box-shadow: none; border: 1px solid rgba(255,255,255,0.05);" onclick="triggerSuccess()">Пропустить шаг ✓</button>
                </div>
            </div>
        </div>

        <div id="screen-success" class="screen right success-screen">
            <div class="success-glow-circle">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div style="text-align: center;">
                <h2 style="font-size: 1.8rem; font-weight: 600; margin-bottom: 6px;">Успешно</h2>
                <p style="color: #6b7280; font-size: 0.95rem; margin-bottom: 25px;">Транзакция одобрена банком</p>
                <div class="amount-display" id="final-sum" style="font-size: 3.2rem; color: var(--sber-neon);">0.00 ₽</div>
            </div>
            <button class="btn-pay" style="width: 100%;" onclick="resetTerminal()">Завершить работу</button>
        </div>

    </div>

    <script>
        let currentSum = "0";
        const screens = {
            amount: document.getElementById('screen-amount'),
            methods: document.getElementById('screen-methods'),
            process: document.getElementById('screen-process'),
            success: document.getElementById('screen-success')
        };
        
        let abortController = null;
        let audioCtx = null;
        let ambientOscillator = null;

        // Палитра готовых чистых SVG-иконок для вставки внутрь спиннера
        const svgIcons = {
            card: `<svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`,
            face: `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
        };

        function initTerminalWithAudio() {
            document.getElementById('audio-screen').style.display = 'none';
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startAmbientNoise();
            } catch (e) {}
        }

        function startAmbientNoise() {
            try {
                ambientOscillator = audioCtx.createOscillator();
                let ambientGain = audioCtx.createGain();
                ambientOscillator.type = 'sine';
                ambientOscillator.frequency.setValueAtTime(55, audioCtx.currentTime); // Более низкий, благородный гул
                ambientGain.gain.setValueAtTime(0.008, audioCtx.currentTime);
                ambientOscillator.connect(ambientGain);
                ambientGain.connect(audioCtx.destination);
                ambientOscillator.start();
            } catch(e){}
        }

        function updateDisplay() {
            document.getElementById('sum-value').innerText = currentSum;
        }

        function appendNum(num) {
            if (currentSum === "0" && num !== ".") currentSum = num;
            else {
                if (num === "." && currentSum.includes(".")) return;
                currentSum += num;
            }
            updateDisplay();
            playClickSound();
        }

        function clearSum() { currentSum = "0"; updateDisplay(); playClickSound(); }

        function goToMethods() {
            if (parseFloat(currentSum) <= 0) return;
            document.getElementById('methods-sum').innerText = currentSum + " ₽";
            screens.amount.className = "screen left";
            screens.methods.className = "screen active";
            playClickSound();
        }

        function goBackToAmount() {
            screens.methods.className = "screen right";
            screens.amount.className = "screen active";
            playClickSound();
        }

        function startProcess(type) {
            screens.methods.className = "screen left";
            screens.process.className = "screen active";
            playClickSound();
            
            document.getElementById('process-sum').innerText = currentSum + " ₽";
            
            document.getElementById('main-spinner').style.display = "flex";
            document.getElementById('qr-code-container').style.display = "none";
            document.getElementById('scan-line').style.display = "none";

            if (type === 'nfc') {
                document.getElementById('process-title').innerText = "Бесконтактный режим";
                document.getElementById('dynamic-icon-holder').innerHTML = svgIcons.card;
                document.getElementById('process-status').innerText = "Приложите карту или девайс с NFC к верхней панели";
                startNFC();
            } 
            else if (type === 'face') {
                document.getElementById('process-title').innerText = "Биометрический анализ";
                document.getElementById('dynamic-icon-holder').innerHTML = svgIcons.face;
                document.getElementById('scan-line').style.display = "block";
                document.getElementById('process-status').innerText = "Идет сканирование геометрии лица...";
                setTimeout(triggerSuccess, 3200);
            } 
            else if (type === 'qr' || type === 'sbp') {
                document.getElementById('process-title').innerText = type === 'qr' ? "SberPay QR" : "Интеграция СБП";
                document.getElementById('main-spinner').style.display = "none";
                document.getElementById('qr-code-container').style.display = "block";
                document.getElementById('process-status').innerText = "Считайте динамический QR-код для завершения транзакции";
                
                const qrContainer = document.getElementById("qrcode");
                qrContainer.innerHTML = "";
                new QRCode(qrContainer, {
                    text: `https://sbp.sberbank.ru/pay?sum=${currentSum}`,
                    width: 160,
                    height: 160,
                    colorDark : "#05070a",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }
        }

        async function startNFC() {
            if ('NDEFReader' in window) {
                try {
                    abortController = new AbortController();
                    const ndef = new NDEFReader();
                    await ndef.scan({ signal: abortController.signal });
                    ndef.onreading = () => {
                        if (navigator.vibrate) navigator.vibrate(200);
                        triggerSuccess();
                    };
                } catch (e) {}
            }
        }

        function triggerSuccess() {
            if (abortController) abortController.abort();
            document.getElementById('final-sum').innerText = parseFloat(currentSum).toFixed(2) + " ₽";
            
            screens.process.className = "screen left";
            screens.success.className = "screen active";
            playSuccessBeep();
        }

        function resetTerminal() {
            currentSum = "0";
            updateDisplay();
            screens.success.className = "screen right";
            screens.amount.className = "screen active";
            playClickSound();
        }

        function playClickSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.04);
                setTimeout(() => osc.stop(), 40);
            } catch(e){}
        }

        function playSuccessBeep() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1300, audioCtx.currentTime + 0.07);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                setTimeout(() => osc.stop(), 300);
            } catch(e){}
        }
    </script>
</body>
